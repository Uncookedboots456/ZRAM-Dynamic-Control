<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZRAM 极简配置</title>
    <style>
        body { background: #121212; color: #e0e0e0; font-family: sans-serif; padding: 20px; margin: 0; font-size: 16px; }
        label { display: block; margin-top: 15px; margin-bottom: 8px; color: #aaa; }
        /* 统一输入框和下拉菜单的样式 */
        input, select, button { 
            width: 100%; 
            box-sizing: border-box; 
            padding: 14px; 
            border-radius: 8px; 
            border: 1px solid #333; 
            background: #222; 
            color: #fff; 
            font-size: 16px; 
            outline: none;
        }
        input:focus, select:focus { border-color: #007bff; }
        button { margin-top: 30px; background: #007bff; font-weight: bold; border: none; cursor: pointer; }
        button:active { background: #0056b3; }
        #msg { margin-top: 20px; text-align: center; font-size: 14px; color: #4caf50; height: 20px; }
    </style>
</head>
<body>
    <h2 style="margin-top:0; color: #fff;">ZRAM 引擎设置</h2>
    
    <label>ZRAM 容量 (GB):</label>
    <input type="number" id="gb" value="12">
    
    <label>压缩协议:</label>
    <select id="algo">
        <option value="lz4" selected>lz4 (极速/低延迟)</option>
        <option value="zstd">zstd (高压/省空间)</option>
    </select>

    <label>Swappiness (0-200):</label>
    <input type="number" id="swap" value="80">

    <label>Watermark Scale:</label>
    <input type="number" id="wm" value="50">

    <button onclick="save()">💾 保存配置</button>
    <div id="msg"></div>

    <script>
        // 极简单向写入逻辑，没有任何多余的读取动作
        async function save() {
            let gb = document.getElementById('gb').value;
            let algo = document.getElementById('algo').value;
            let swap = document.getElementById('swap').value;
            let wm = document.getElementById('wm').value;
            
            if(!gb || !swap || !wm) {
                document.getElementById('msg').innerText = "❌ 请填写完整！";
                document.getElementById('msg').style.color = "#f44336";
                return;
            }
            
            // 拼接配置文本
            let confData = `ZRAM_SIZE_GB=${gb}\nCOMP_ALGORITHM=${algo}\nSWAPPINESS=${swap}\nWATERMARK_SCALE_FACTOR=${wm}\n`;
            
            // 写入文件
            if (typeof ksu !== 'undefined') {
                await ksu.exec(`echo "${confData}" > /data/adb/modules/zram_12g_uncookedboot/config.conf`);
                document.getElementById('msg').innerText = "✅ 已保存！请返回点击 Action 按钮执行。";
                document.getElementById('msg').style.color = "#4caf50";
            } else {
                document.getElementById('msg').innerText = "❌ 环境异常：未检测到 KSU";
                document.getElementById('msg').style.color = "#f44336";
            }
        }
    </script>
</body>
</html>
