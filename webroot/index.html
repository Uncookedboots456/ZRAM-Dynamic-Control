<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZRAM 极简配置</title>
    <style>
        body { background: #121212; color: #e0e0e0; font-family: sans-serif; padding: 20px; margin: 0; font-size: 16px; }
        h2 { margin-top: 0; color: #fff; }
        label { display: block; margin-top: 15px; margin-bottom: 8px; color: #aaa; }
        input, select, button {
            width: 100%;
            box-sizing: border-box;
            padding: 14px;
            border-radius: 8px;
            border: 1px solid #333;
            background: #222;
            color: #fff;
            font-size: 16px;
            outline: none;
        }
        input:focus, select:focus { border-color: #007bff; }
        button { margin-top: 18px; background: #007bff; font-weight: bold; border: none; cursor: pointer; }
        button:active { background: #0056b3; }
        .hint { margin-top: 8px; color: #9aa0a6; font-size: 13px; }
        .quick-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; }
        .quick-btn { margin-top: 0; padding: 12px; background: #2a2a2a; border: 1px solid #3a3a3a; }
        .quick-btn.active { border-color: #007bff; background: #163b63; }
        #status { margin-top: 12px; color: #4caf50; font-size: 14px; }
        #msg { margin-top: 20px; text-align: center; font-size: 14px; min-height: 20px; color: #4caf50; }
    </style>
</head>
<body>
    <h2>ZRAM 引擎设置</h2>

    <div id="status">正在读取当前配置...</div>

    <label>ZRAM 容量 (GB):</label>
    <input type="number" id="gb" value="1" min="1" step="1">
    <div class="quick-grid">
        <button type="button" class="quick-btn" data-ratio="2">1/2 物理内存</button>
        <button type="button" class="quick-btn" data-ratio="3">1/3 物理内存</button>
        <button type="button" class="quick-btn" data-ratio="4">1/4 物理内存</button>
    </div>
    <div class="hint" id="memHint">物理内存上限读取中...</div>

    <label>压缩协议:</label>
    <select id="algo">
        <option value="lz4">lz4 (极速/低延迟)</option>
        <option value="zstd">zstd (高压/省空间)</option>
    </select>

    <label>Swappiness (0-200):</label>
    <input type="number" id="swap" value="80" min="0" max="200" step="1">

    <label>Watermark Scale:</label>
    <input type="number" id="wm" value="50" min="1" step="1">

    <button onclick="save()">保存配置并启用</button>
    <div id="msg"></div>

    <script>
        const configPath = '/data/adb/modules/zram_12g_uncookedboot/config.conf';
        let memTotalGb = 1;

        function setMessage(text, ok = false) {
            const msg = document.getElementById('msg');
            msg.innerText = text;
            msg.style.color = ok ? '#4caf50' : '#f44336';
        }

        function normalizeExecResult(result) {
            if (typeof result === 'string') return result;
            if (!result) return '';
            if (typeof result.stdout === 'string') return result.stdout;
            if (typeof result.stderr === 'string' && !result.stdout) return result.stderr;
            if (Array.isArray(result)) return result.join('\n');
            return String(result);
        }

        async function execShell(command) {
            const result = await ksu.exec(command);
            return normalizeExecResult(result).trim();
        }

        function parseConfig(text) {
            const config = {};
            text.split(/\r?\n/).forEach((line) => {
                const index = line.indexOf('=');
                if (index > 0) {
                    const key = line.slice(0, index).trim();
                    const value = line.slice(index + 1).trim();
                    config[key] = value;
                }
            });
            return config;
        }

        function clearQuickActive() {
            document.querySelectorAll('.quick-btn').forEach((button) => {
                button.classList.remove('active');
            });
        }

        function applyQuickRatio(ratio, button) {
            const value = Math.max(1, Math.floor(memTotalGb / ratio));
            document.getElementById('gb').value = String(value);
            clearQuickActive();
            if (button) button.classList.add('active');
            setMessage(`已按物理内存的 1/${ratio} 填入 ${value}GB`, true);
        }

        function validateValues(values) {
            const gb = Number(values.gb);
            const swap = Number(values.swap);
            const wm = Number(values.wm);

            if (!Number.isInteger(gb) || gb <= 0) {
                return 'ZRAM 容量必须是正整数 GB。';
            }
            if (gb > memTotalGb) {
                return `ZRAM 容量不能超过物理内存上限 ${memTotalGb}GB。`;
            }
            if (!Number.isInteger(swap) || swap < 0 || swap > 200) {
                return 'Swappiness 必须是 0 到 200 之间的整数。';
            }
            if (!Number.isInteger(wm) || wm <= 0) {
                return 'Watermark Scale 必须是正整数。';
            }
            if (!['lz4', 'zstd'].includes(values.algo)) {
                return '压缩协议无效。';
            }
            return '';
        }

        async function loadConfig() {
            if (typeof ksu === 'undefined') {
                document.getElementById('status').innerText = '环境异常：未检测到 KSU';
                document.getElementById('status').style.color = '#f44336';
                return;
            }

            try {
                const memKbText = await execShell("awk '/MemTotal/ {print $2}' /proc/meminfo");
                const parsedMemKb = Number(memKbText);
                if (Number.isFinite(parsedMemKb) && parsedMemKb > 0) {
                    memTotalGb = Math.max(1, Math.floor(parsedMemKb / 1024 / 1024));
                }

                const confText = await execShell(`cat ${configPath}`);
                const config = parseConfig(confText);

                document.getElementById('gb').value = config.ZRAM_SIZE_GB || '1';
                document.getElementById('algo').value = config.COMP_ALGORITHM || 'lz4';
                document.getElementById('swap').value = config.SWAPPINESS || '80';
                document.getElementById('wm').value = config.WATERMARK_SCALE_FACTOR || '50';
                document.getElementById('gb').max = String(memTotalGb);
                document.getElementById('memHint').innerText = `物理内存上限 ${memTotalGb}GB，可直接输入或使用快捷比例。`;

                const enabled = config.ENABLED === '1';
                const status = document.getElementById('status');
                status.innerText = enabled
                    ? '当前状态：已启用，保存后将更新配置并继续接管。'
                    : '当前状态：未启用，保存后会写入配置并启用开机自动应用。';
                status.style.color = enabled ? '#4caf50' : '#ffb74d';
            } catch (error) {
                document.getElementById('status').innerText = '读取配置失败，请检查模块路径或 KSU 权限。';
                document.getElementById('status').style.color = '#f44336';
                setMessage(String(error));
            }
        }

        async function save() {
            if (typeof ksu === 'undefined') {
                setMessage('环境异常：未检测到 KSU');
                return;
            }

            const values = {
                gb: document.getElementById('gb').value.trim(),
                algo: document.getElementById('algo').value,
                swap: document.getElementById('swap').value.trim(),
                wm: document.getElementById('wm').value.trim()
            };

            const error = validateValues(values);
            if (error) {
                setMessage(`❌ ${error}`);
                return;
            }

            const confData = `ENABLED=1\nZRAM_SIZE_GB=${values.gb}\nCOMP_ALGORITHM=${values.algo}\nSWAPPINESS=${values.swap}\nWATERMARK_SCALE_FACTOR=${values.wm}\n`;
            const command = `cat > ${configPath} <<'EOF'\n${confData}EOF`;

            try {
                await ksu.exec(command);
                document.getElementById('status').innerText = '当前状态：已启用，后续开机会自动应用。';
                document.getElementById('status').style.color = '#4caf50';
                setMessage('✅ 已保存并启用，请返回点击 Action 立即执行，或等待下次开机自动应用。', true);
            } catch (error) {
                setMessage(`❌ 保存失败：${error}`);
            }
        }

        document.querySelectorAll('.quick-btn').forEach((button) => {
            button.addEventListener('click', () => {
                applyQuickRatio(Number(button.dataset.ratio), button);
            });
        });

        document.getElementById('gb').addEventListener('input', () => {
            clearQuickActive();
        });

        loadConfig();
    </script>
</body>
</html>
