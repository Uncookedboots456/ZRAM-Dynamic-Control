<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZRAM Dynamic Control</title>
    <style>
        body { background: #121212; color: #e0e0e0; font-family: sans-serif; padding: 20px; margin: 0; font-size: 16px; }
        .topbar { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 8px; }
        h2 { margin: 0; color: #fff; }
        label { display: block; margin-top: 15px; margin-bottom: 8px; color: #aaa; }
        input, select, button {
            width: 100%;
            box-sizing: border-box;
            padding: 14px;
            border-radius: 8px;
            border: 1px solid #333;
            background: #222;
            color: #fff;
            font-size: 16px;
            outline: none;
        }
        input:focus, select:focus { border-color: #007bff; }
        button { margin-top: 18px; background: #007bff; font-weight: bold; border: none; cursor: pointer; }
        button:active { background: #0056b3; }
        .lang-btn {
            width: 44px;
            min-width: 44px;
            height: 44px;
            margin-top: 0;
            padding: 0;
            border-radius: 999px;
            font-size: 20px;
            line-height: 1;
            background: #1d1d1d;
            border: 1px solid #3a3a3a;
        }
        .hint { margin-top: 8px; color: #9aa0a6; font-size: 13px; line-height: 1.5; }
        #status { margin-top: 12px; color: #4caf50; font-size: 14px; line-height: 1.5; white-space: pre-wrap; }
        #msg { margin-top: 20px; text-align: left; font-size: 14px; min-height: 20px; color: #4caf50; line-height: 1.5; white-space: pre-wrap; }
    </style>
</head>
<body>
    <div class="topbar">
        <h2 id="pageTitle">ZRAM 引擎设置</h2>
        <button type="button" id="langToggle" class="lang-btn" aria-label="Switch language" title="Switch language">🌐</button>
    </div>

    <div id="status">正在读取当前配置...</div>

    <label id="zramLabel" for="zramKb">ZRAM 容量 (KB):</label>
    <input type="number" id="zramKb" value="1024" min="1" step="1">
    <div class="hint" id="memHint">物理内存上限读取中...</div>

    <label id="algoLabel" for="algo">压缩协议:</label>
    <select id="algo">
        <option value="lz4">lz4</option>
        <option value="zstd">zstd</option>
    </select>

    <label id="swapLabel" for="swap">Swappiness (0-200):</label>
    <input type="number" id="swap" value="80" min="0" max="200" step="1">

    <label id="wmLabel" for="wm">Watermark Scale:</label>
    <input type="number" id="wm" value="50" min="1" step="1">

    <button id="saveButton" onclick="saveAndApply()">保存并立即执行</button>
    <div id="msg"></div>

    <script>
        const modPath = '/data/adb/modules/zram_12g_uncookedboot';
        const configPath = `${modPath}/config.conf`;
        const actionPath = `${modPath}/action.sh`;
        let memTotalKb = 1024;
        let currentLang = (typeof localStorage !== 'undefined' && localStorage.getItem('zram_ui_lang')) || 'zh';
        let currentState = { enabled: false, loadFailed: false };
        let lastMessage = { key: '', params: {}, ok: false, rawText: '' };

        const translations = {
            zh: {
                title: 'ZRAM 引擎设置',
                zramLabel: 'ZRAM 容量 (KB):',
                algoLabel: '压缩协议:',
                swapLabel: 'Swappiness (0-200):',
                wmLabel: 'Watermark Scale:',
                saveButton: '保存并立即执行',
                loading: '正在读取当前配置...',
                noKsu: '环境异常：未检测到 KSU',
                readFailed: '读取配置失败，请检查模块路径或 KSU 权限。',
                statusEnabled: '当前状态：已启用。\n点击下方按钮会保存配置并立即执行。',
                statusDisabled: '当前状态：未启用。\n点击下方按钮会保存配置、启用模块并立即执行。',
                statusApplied: '当前状态：已启用，本次请求已写入并尝试立即执行。',
                memHint: '物理内存上限 {memKb}KB (~{memGb}GB)。请直接输入目标 KB 值。',
                invalidZram: 'ZRAM 容量必须是正整数 KB。',
                invalidZramMax: 'ZRAM 容量不能超过物理内存上限 {memKb}KB。',
                invalidSwap: 'Swappiness 必须是 0 到 200 之间的整数。',
                invalidWm: 'Watermark Scale 必须是正整数。',
                invalidAlgo: '压缩协议无效。',
                saveSuccess: '✅ 配置已保存并立即执行成功。\n\n{details}',
                saveExecFailed: '❌ 配置已保存，但本次立即执行失败。\n\n{details}',
                saveFailed: '❌ 保存或执行失败：{details}'
            },
            en: {
                title: 'ZRAM Control',
                zramLabel: 'ZRAM Size (KB):',
                algoLabel: 'Compression Algorithm:',
                swapLabel: 'Swappiness (0-200):',
                wmLabel: 'Watermark Scale:',
                saveButton: 'Save and Apply Now',
                loading: 'Loading current configuration...',
                noKsu: 'Environment error: KSU not detected.',
                readFailed: 'Failed to read the configuration. Check the module path or KSU permission.',
                statusEnabled: 'Current state: enabled.\nPress the button below to save and apply immediately.',
                statusDisabled: 'Current state: disabled.\nPress the button below to save the configuration, enable the module, and apply immediately.',
                statusApplied: 'Current state: enabled. This request has been saved and an immediate apply was attempted.',
                memHint: 'Physical memory limit: {memKb}KB (~{memGb}GB). Enter the target value directly in KB.',
                invalidZram: 'ZRAM size must be a positive integer in KB.',
                invalidZramMax: 'ZRAM size must not exceed the physical memory limit of {memKb}KB.',
                invalidSwap: 'Swappiness must be an integer between 0 and 200.',
                invalidWm: 'Watermark Scale must be a positive integer.',
                invalidAlgo: 'Invalid compression algorithm.',
                saveSuccess: '✅ Configuration saved and applied successfully.\n\n{details}',
                saveExecFailed: '❌ Configuration was saved, but the immediate apply failed.\n\n{details}',
                saveFailed: '❌ Save or apply failed: {details}'
            }
        };

        function t(key, params = {}) {
            const dict = translations[currentLang] || translations.zh;
            let text = dict[key] || translations.zh[key] || key;
            Object.keys(params).forEach((name) => {
                text = text.replaceAll(`{${name}}`, String(params[name]));
            });
            return text;
        }

        function formatApproxGb(kb) {
            return (Number(kb) / 1024 / 1024).toFixed(2);
        }

        function setMessage(text, ok = false) {
            const msg = document.getElementById('msg');
            msg.innerText = text;
            msg.style.color = ok ? '#4caf50' : '#f44336';
        }

        function setTranslatedMessage(key, params = {}, ok = false, rawText = '') {
            lastMessage = { key, params, ok, rawText };
            setMessage(rawText || t(key, params), ok);
        }

        function refreshMessage() {
            if (!lastMessage.key && !lastMessage.rawText) return;
            setMessage(lastMessage.rawText || t(lastMessage.key, lastMessage.params), lastMessage.ok);
        }

        function refreshStatus() {
            const status = document.getElementById('status');
            if (currentState.loadFailed) {
                status.innerText = t('readFailed');
                status.style.color = '#f44336';
                return;
            }
            status.innerText = currentState.enabled ? t('statusEnabled') : t('statusDisabled');
            status.style.color = currentState.enabled ? '#4caf50' : '#ffb74d';
        }

        function applyLanguage(lang) {
            currentLang = lang === 'en' ? 'en' : 'zh';
            if (typeof localStorage !== 'undefined') {
                localStorage.setItem('zram_ui_lang', currentLang);
            }
            document.documentElement.lang = currentLang === 'en' ? 'en' : 'zh-CN';
            document.title = t('title');
            document.getElementById('pageTitle').innerText = t('title');
            document.getElementById('zramLabel').innerText = t('zramLabel');
            document.getElementById('algoLabel').innerText = t('algoLabel');
            document.getElementById('swapLabel').innerText = t('swapLabel');
            document.getElementById('wmLabel').innerText = t('wmLabel');
            document.getElementById('saveButton').innerText = t('saveButton');
            document.getElementById('langToggle').title = currentLang === 'zh' ? 'Switch to English' : '切换到中文';
            document.getElementById('langToggle').setAttribute('aria-label', document.getElementById('langToggle').title);
            document.getElementById('memHint').innerText = t('memHint', { memKb: memTotalKb, memGb: formatApproxGb(memTotalKb) });
            refreshStatus();
            refreshMessage();
        }

        function extractExitCode(result) {
            if (!result || typeof result === 'string') return 0;
            if (typeof result.code === 'number') return result.code;
            if (typeof result.exitCode === 'number') return result.exitCode;
            if (typeof result.status === 'number') return result.status;
            return 0;
        }

        function normalizeExecResult(result) {
            if (typeof result === 'string') return { text: result, code: 0 };
            if (!result) return { text: '', code: 0 };
            if (typeof result.stdout === 'string') {
                return { text: result.stdout, code: extractExitCode(result) };
            }
            if (typeof result.stderr === 'string' && !result.stdout) {
                return { text: result.stderr, code: extractExitCode(result) };
            }
            if (Array.isArray(result)) {
                return { text: result.join('\n'), code: 0 };
            }
            return { text: String(result), code: extractExitCode(result) };
        }

        async function execShell(command) {
            const result = await ksu.exec(command);
            return normalizeExecResult(result);
        }

        function parseConfig(text) {
            const config = {};
            text.split(/\r?\n/).forEach((line) => {
                const index = line.indexOf('=');
                if (index > 0) {
                    const key = line.slice(0, index).trim();
                    const value = line.slice(index + 1).trim();
                    config[key] = value;
                }
            });
            return config;
        }

        function readConfigZramKb(config) {
            if (/^\d+$/.test(config.ZRAM_SIZE_KB || '')) {
                return config.ZRAM_SIZE_KB;
            }
            if (/^\d+$/.test(config.ZRAM_SIZE_GB || '')) {
                return String(Number(config.ZRAM_SIZE_GB) * 1024 * 1024);
            }
            return '1024';
        }

        function validateValues(values) {
            const zramKb = Number(values.zramKb);
            const swap = Number(values.swap);
            const wm = Number(values.wm);

            if (!Number.isInteger(zramKb) || zramKb <= 0) {
                return t('invalidZram');
            }
            if (zramKb > memTotalKb) {
                return t('invalidZramMax', { memKb: memTotalKb });
            }
            if (!Number.isInteger(swap) || swap < 0 || swap > 200) {
                return t('invalidSwap');
            }
            if (!Number.isInteger(wm) || wm <= 0) {
                return t('invalidWm');
            }
            if (!['lz4', 'zstd'].includes(values.algo)) {
                return t('invalidAlgo');
            }
            return '';
        }

        async function loadConfig() {
            if (typeof ksu === 'undefined') {
                currentState.loadFailed = true;
                document.getElementById('status').innerText = t('noKsu');
                document.getElementById('status').style.color = '#f44336';
                return;
            }

            try {
                const memResult = await execShell("awk '/MemTotal/ {print $2}' /proc/meminfo");
                const parsedMemKb = Number((memResult.text || '').trim());
                if (Number.isFinite(parsedMemKb) && parsedMemKb > 0) {
                    memTotalKb = parsedMemKb;
                }

                const confResult = await execShell(`cat ${configPath}`);
                const config = parseConfig(confResult.text || '');
                const zramKb = readConfigZramKb(config);
                document.getElementById('zramKb').value = zramKb;
                document.getElementById('algo').value = config.COMP_ALGORITHM || 'lz4';
                document.getElementById('swap').value = config.SWAPPINESS || '80';
                document.getElementById('wm').value = config.WATERMARK_SCALE_FACTOR || '50';
                document.getElementById('zramKb').max = String(memTotalKb);
                currentState.enabled = config.ENABLED === '1';
                currentState.loadFailed = false;
                applyLanguage(currentLang);
            } catch (error) {
                currentState.loadFailed = true;
                document.getElementById('status').innerText = t('readFailed');
                document.getElementById('status').style.color = '#f44336';
                setMessage(String(error));
            }
        }

        async function saveAndApply() {
            if (typeof ksu === 'undefined') {
                setMessage(t('noKsu'));
                return;
            }

            const values = {
                zramKb: document.getElementById('zramKb').value.trim(),
                algo: document.getElementById('algo').value,
                swap: document.getElementById('swap').value.trim(),
                wm: document.getElementById('wm').value.trim()
            };

            const error = validateValues(values);
            if (error) {
                setMessage(`❌ ${error}`);
                return;
            }

            const confData = `ENABLED=1\nZRAM_SIZE_KB=${values.zramKb}\nCOMP_ALGORITHM=${values.algo}\nSWAPPINESS=${values.swap}\nWATERMARK_SCALE_FACTOR=${values.wm}\n`;
            const writeCommand = `cat > ${configPath} <<'EOF'\n${confData}EOF`;

            try {
                await ksu.exec(writeCommand);
                const execResult = await execShell(`sh ${actionPath} --plain 2>&1`);
                currentState.enabled = true;
                document.getElementById('status').innerText = t('statusApplied');
                document.getElementById('status').style.color = '#4caf50';

                if (execResult.code === 0) {
                    setTranslatedMessage('saveSuccess', { details: (execResult.text || '').trim() }, true);
                } else {
                    setTranslatedMessage('saveExecFailed', { details: (execResult.text || '').trim() }, false);
                }
            } catch (error) {
                setTranslatedMessage('saveFailed', { details: String(error) }, false);
            }
        }

        document.getElementById('langToggle').addEventListener('click', () => {
            applyLanguage(currentLang === 'zh' ? 'en' : 'zh');
        });

        applyLanguage(currentLang);
        document.getElementById('status').innerText = t('loading');
        loadConfig();
    </script>
</body>
</html>
